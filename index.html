class SpatialHashGrid {
    constructor(cellSize) {
        this.cellSize = cellSize || 128;
        this.cells = new Map();
    }
    clear() { this.cells.clear(); }
    _key(x, y) {
        const cx = Math.floor(x / this.cellSize);
        const cy = Math.floor(y / this.cellSize);
        return (cx * 73856093) ^ (cy * 19349663);
    }
    insert(entity) {
        const k = this._key(entity.x, entity.y);
        let cell = this.cells.get(k);
        if (!cell) { cell = []; this.cells.set(k, cell); }
        cell.push(entity);
    }
    getNearby(x, y, radius) {
        const results = [];
        const cr = Math.ceil(radius / this.cellSize) + 1;
        const cx = Math.floor(x / this.cellSize);
        const cy = Math.floor(y / this.cellSize);
        for (let dx = -cr; dx <= cr; dx++) {
            for (let dy = -cr; dy <= cr; dy++) {
                const k = ((cx + dx) * 73856093) ^ ((cy + dy) * 19349663);
                const cell = this.cells.get(k);
                if (cell) {
                    for (let i = 0; i < cell.length; i++) {
                        results.push(cell[i]);
                    }
                }
            }
        }
        return results;
    }
    findNearest(x, y, radius, filter) {
        const nearby = this.getNearby(x, y, radius);
        let best = null, bestDist = radius * radius;
        for (let i = 0; i < nearby.length; i++) {
            const e = nearby[i];
            if (filter && !filter(e)) continue;
            const dx = e.x - x, dy = e.y - y;
            const d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; best = e; }
        }
        return best;
    }
}

class ProceduralSprites {
    static generate(textures) {
        this._genPlayer(textures);
        this._genEnemies(textures);
        this._genProjectiles(textures);
        this._genXPGems(textures);
        this._genParticle(textures);
        this._genPickups(textures);
        this._genChest(textures);
        this._genDestructibles(textures);
        this._genBitmapFont(textures);
        this._genVignette(textures);
        this._genUI(textures);
    }

    static _ctx(w, h) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        return { canvas: c, ctx: c.getContext('2d') };
    }

    static _genPlayer(textures) {
        const { canvas, ctx } = this._ctx(32, 32);
        ctx.shadowColor = '#81D4FA'; ctx.shadowBlur = 6;
        ctx.fillStyle = '#4FC3F7';
        ctx.beginPath();
        ctx.roundRect(4, 2, 24, 22, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#81D4FA'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(4, 2, 24, 22, 4); ctx.stroke();
        ctx.fillStyle = '#1A237E';
        ctx.fillRect(10, 6, 12, 4);
        ctx.fillStyle = '#3A8FD4';
        ctx.fillRect(9, 24, 5, 6);
        ctx.fillRect(18, 24, 5, 6);
        textures.addCanvas('player', canvas);
    }

    static _genEnemies(textures) {
        // Fodder
        let { canvas, ctx } = this._ctx(24, 24);
        ctx.fillStyle = '#EF5350';
        ctx.beginPath(); ctx.arc(12, 12, 11, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#B71C1C';
        ctx.beginPath(); ctx.arc(12, 12, 4, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(12, 12, 11, 0, Math.PI * 2); ctx.stroke();
        textures.addCanvas('enemy_fodder', canvas);

        // Elite - hexagon
        ({ canvas, ctx } = this._ctx(28, 28));
        ctx.fillStyle = '#AB47BC';
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i - Math.PI / 6;
            const x = 14 + 12 * Math.cos(a), y = 14 + 12 * Math.sin(a);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#E1BEE7'; ctx.lineWidth = 1; ctx.stroke();
        textures.addCanvas('enemy_elite', canvas);

        // Tank
        ({ canvas, ctx } = this._ctx(36, 36));
        ctx.fillStyle = '#FF7043'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.fillRect(2, 2, 32, 32); ctx.strokeRect(2, 2, 32, 32);
        ctx.strokeStyle = '#BF360C'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(2, 2); ctx.lineTo(34, 34); ctx.moveTo(34, 2); ctx.lineTo(2, 34); ctx.stroke();
        textures.addCanvas('enemy_tank', canvas);

        // Ranged - diamond
        ({ canvas, ctx } = this._ctx(22, 22));
        ctx.fillStyle = '#66BB6A';
        ctx.beginPath();
        ctx.moveTo(11, 1); ctx.lineTo(21, 11); ctx.lineTo(11, 21); ctx.lineTo(1, 11);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
        ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(11, -4); ctx.stroke();
        textures.addCanvas('enemy_ranged', canvas);

        // Hazard vehicle
        ({ canvas, ctx } = this._ctx(80, 28));
        ctx.fillStyle = '#FFEE58';
        ctx.fillRect(2, 2, 76, 24);
        ctx.fillStyle = '#F9A825';
        ctx.fillRect(10, 10, 60, 8);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.strokeRect(2, 2, 76, 24);
        textures.addCanvas('enemy_hazard', canvas);

        // Boss sprites
        for (const [key, bd] of Object.entries(BOSS_DATA)) {
            const s = bd.size;
            ({ canvas, ctx } = this._ctx(s, s));
            const c = bd.color;
            ctx.shadowColor = c; ctx.shadowBlur = 15;
            ctx.fillStyle = c;
            ctx.beginPath(); ctx.arc(s/2, s/2, s/2 - 8, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath(); ctx.arc(s/2, s/2, s/3, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(s/2, s/2, s/2 - 8, 0, Math.PI * 2); ctx.stroke();
            textures.addCanvas('boss_' + key, canvas);
        }
    }

    static _genProjectiles(textures) {
        const colors = ['#FFF176','#81D4FA','#CE93D8','#FFAB91','#A5D6A7','#FFE082','#80DEEA','#FFF9C4','#B0BEC5','#E1F5FE','#E53935'];
        const names = ['proj_player','proj_w02','proj_w03','proj_w04','proj_w05','proj_w06','proj_w07','proj_w08','proj_w09','proj_w10','proj_enemy'];
        for (let i = 0; i < colors.length; i++) {
            const sz = 10;
            const { canvas, ctx } = this._ctx(sz, sz);
            const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
            g.addColorStop(0, '#ffffff');
            g.addColorStop(0.3, colors[i]);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, sz, sz);
            textures.addCanvas(names[i], canvas);
        }
        // Sweep arc
        const { canvas: sc, ctx: sctx } = this._ctx(64, 32);
        sctx.fillStyle = '#FFF176';
        sctx.globalAlpha = 0.7;
        sctx.beginPath(); sctx.ellipse(32, 16, 30, 14, 0, 0, Math.PI); sctx.fill();
        textures.addCanvas('proj_sweep', sc);
    }

    static _genXPGems(textures) {
        // Normal gem
        let { canvas, ctx } = this._ctx(10, 10);
        ctx.fillStyle = '#69F0AE';
        ctx.beginPath();
        ctx.moveTo(5, 0); ctx.lineTo(10, 5); ctx.lineTo(5, 10); ctx.lineTo(0, 5);
        ctx.closePath(); ctx.fill();
        textures.addCanvas('xp_gem', canvas);
        // Rare gem
        ({ canvas, ctx } = this._ctx(16, 16));
        ctx.fillStyle = '#FFD54F';
        ctx.beginPath();
        ctx.moveTo(8, 0); ctx.lineTo(16, 8); ctx.lineTo(8, 16); ctx.lineTo(0, 8);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 1; ctx.stroke();
        textures.addCanvas('xp_gem_rare', canvas);
    }

    static _genParticle(textures) {
        const { canvas, ctx } = this._ctx(8, 8);
        const g = ctx.createRadialGradient(4, 4, 0, 4, 4, 4);
        g.addColorStop(0, 'rgba(255,255,255,1)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 8, 8);
        textures.addCanvas('particle', canvas);
    }

    static _genPickups(textures) {
        // Heal
        let { canvas, ctx } = this._ctx(16, 16);
        ctx.fillStyle = '#66BB6A';
        ctx.fillRect(5, 2, 6, 12);
        ctx.fillRect(2, 5, 12, 6);
        textures.addCanvas('pickup_heal', canvas);
        // Gold
        ({ canvas, ctx } = this._ctx(16, 16));
        ctx.fillStyle = '#FFC107';
        ctx.beginPath(); ctx.arc(8, 8, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FF8F00';
        ctx.beginPath(); ctx.arc(8, 8, 4, 0, Math.PI * 2); ctx.fill();
        textures.addCanvas('pickup_gold', canvas);
        // Magnet
        ({ canvas, ctx } = this._ctx(16, 16));
        ctx.fillStyle = '#E53935';
        ctx.beginPath(); ctx.arc(5, 5, 5, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#42A5F5';
        ctx.beginPath(); ctx.arc(11, 5, 5, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#E53935'; ctx.fillRect(0, 5, 5, 8);
        ctx.fillStyle = '#42A5F5'; ctx.fillRect(11, 5, 5, 8);
        textures.addCanvas('pickup_magnet', canvas);
        // Nuke
        ({ canvas, ctx } = this._ctx(16, 16));
        ctx.fillStyle = '#FFEE58';
        ctx.beginPath(); ctx.arc(8, 8, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#F44336';
        ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('!', 8, 9);
        textures.addCanvas('pickup_nuke', canvas);
    }

    static _genChest(textures) {
        const { canvas, ctx } = this._ctx(32, 24);
        ctx.fillStyle = '#FFC107';
        ctx.fillRect(2, 6, 28, 16);
        ctx.fillStyle = '#FF8F00';
        ctx.fillRect(2, 6, 28, 4);
        ctx.strokeStyle = '#FFD54F'; ctx.lineWidth = 2;
        ctx.strokeRect(2, 6, 28, 16);
        ctx.fillStyle = '#FFF'; ctx.fillRect(13, 14, 6, 4);
        textures.addCanvas('chest', canvas);
    }

    static _genDestructibles(textures) {
        let { canvas, ctx } = this._ctx(24, 24);
        ctx.fillStyle = '#455A64';
        ctx.fillRect(2, 2, 20, 20);
        ctx.strokeStyle = '#263238'; ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, 20, 20);
        textures.addCanvas('destructible_small', canvas);

        ({ canvas, ctx } = this._ctx(36, 36));
        ctx.fillStyle = '#546E7A';
        ctx.fillRect(2, 2, 32, 32);
        ctx.strokeStyle = '#263238'; ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, 32, 32);
        ctx.fillStyle = '#37474F';
        ctx.fillRect(10, 10, 16, 16);
        textures.addCanvas('destructible_large', canvas);
    }

    static _genBitmapFont(textures) {
        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ:.-/%+! ';
        const cw = 12, ch = 18;
        const cols = chars.length;
        const { canvas, ctx } = this._ctx(cols * cw, ch);
        ctx.fillStyle = '#ECEFF1';
        ctx.font = 'bold 14px monospace';
        ctx.textBaseline = 'top';
        for (let i = 0; i < chars.length; i++) {
            ctx.fillText(chars[i], i * cw + 1, 1);
        }
        textures.addCanvas('bitmapfont', canvas);
        // Store char map
        ProceduralSprites.fontChars = {};
        ProceduralSprites.fontCW = cw;
        ProceduralSprites.fontCH = ch;
        for (let i = 0; i < chars.length; i++) {
            ProceduralSprites.fontChars[chars[i]] = i;
        }
    }

    static _genVignette(textures) {
        const w = 1280, h = 720;
        const { canvas, ctx } = this._ctx(w, h);
        const g = ctx.createRadialGradient(w/2, h/2, w*0.25, w/2, h/2, w*0.7);
        g.addColorStop(0, 'rgba(0,0,0,0)');
        g.addColorStop(1, 'rgba(0,0,0,0.7)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
        textures.addCanvas('vignette', canvas);
    }

    static _genUI(textures) {
        // White flash overlay
        const { canvas, ctx } = this._ctx(4, 4);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 4, 4);
        textures.addCanvas('white', canvas);
    }
}

// === BITMAP TEXT HELPER ===
class BitmapText {
    constructor(scene, x, y, text, scale, tint) {
        this.scene = scene;
        this.sprites = [];
        this.container = scene.add.container(x, y);
        this.container.setDepth(1000);
        this._scale = scale || 1;
        this._tint = tint;
        this.setText(text || '');
    }
    setText(text) {
        text = String(text).toUpperCase();
        const cw = ProceduralSprites.fontCW;
        // Reuse or create sprites
        while (this.sprites.length < text.length) {
            const s = this.scene.add.sprite(0, 0, 'bitmapfont');
            s.setScale(this._scale);
            s.setOrigin(0, 0);
            if (this._tint) s.setTint(this._tint);
            this.container.add(s);
            this.sprites.push(s);
        }
        for (let i = 0; i < this.sprites.length; i++) {
            if (i < text.length) {
                const charIdx = ProceduralSprites.fontChars[text[i]];
                if (charIdx !== undefined) {
                    this.sprites[i].setVisible(true);
                    this.sprites[i].setCrop(charIdx * cw, 0, cw, ProceduralSprites.fontCH);
                    this.sprites[i].setPosition(i * cw * this._scale, 0);
                } else {
                    this.sprites[i].setVisible(false);
                }
            } else {
                this.sprites[i].setVisible(false);
            }
        }
        this._text = text;
    }
    setPosition(x, y) { this.container.setPosition(x, y); }
    setScrollFactor(x, y) { this.container.setScrollFactor(x, y !== undefined ? y : x); }
    setDepth(d) { this.container.setDepth(d); }
    setVisible(v) { this.container.setVisible(v); }
    destroy() { this.container.destroy(); }
}

// === WEAPON CLASSES ===
class WeaponBase {
    constructor(scene, weaponId, level) {
        this.scene = scene;
        this.id = weaponId;
        this.data = WEAPON_DATA[weaponId];
        this.level = level || 1;
        this.cooldownTimer = 0;
        this.evolved = false;
        this.evoId = null;
    }
    getEffectiveStat(stat) {
        const base = this.data[stat];
        if (base === undefined) return 0;
        const bonus = this.data.levelBonuses[stat] || 0;
        let val = base;
        if (stat === 'damage' || stat === 'baseDmg') {
            val = this.data.baseDmg * (1 + (this.level - 1) * 0.25);
        } else if (stat === 'cooldown') {
            val = Math.max(0.05, base + (this.level - 1) * bonus);
        } else if (stat === 'projectileCount') {
            if (this.id === 'weapon_02') {
                val = 1 + Math.floor((this.level - 1) / 2);
            } else {
                val = base + Math.floor((this.level - 1) * bonus);
            }
        } else if (stat === 'area') {
            val = base * (1 + (this.level - 1) * (bonus || 0));
        }
        return val;
    }
    getDamage() {
        const p = this.scene.player;
        const baseDmg = this.data.baseDmg * (1 + (this.level - 1) * 0.25);
        const areaBonus = (p.stats.area - 1.0);
        const critChance = Math.min(0.50, 0.05 + (p.stats.luck * 0.01));
        const isCrit = this.evolved && this.evoId === 'evo_01' ? true : Math.random() < critChance;
        const critMult = isCrit ? 2.0 : 1.0;
        const globalDmg = p.stats.damage - 1.0;
        return Math.max(1, Math.floor(baseDmg * (1 + areaBonus) * critMult * (1 + globalDmg)));
    }
    getCooldown() {
        const base = this.data.cooldown + (this.level - 1) * (this.data.levelBonuses.cooldown || 0);
        const cdr = this.scene.player.stats.cooldownReduction || 0;
        return Math.max(0.05, base * (1 - cdr));
    }
    getProjectileCount() {
        if (this.id === 'weapon_02') return 1 + Math.floor((this.level - 1) / 2);
        const bonus = this.data.levelBonuses.projectileCount || 0;
        return Math.max(1, Math.floor(this.data.projectileCount + (this.level - 1) * bonus));
    }
    getArea() {
        const bonus = this.data.levelBonuses.area || 0;
        return this.data.area * (1 + (this.level - 1) * bonus) * this.scene.player.stats.area;
    }
    update(time, delta) {
        const dt = delta / 1000;
        this.cooldownTimer -= dt;
        if (this.cooldownTimer <= 0) {
            this.fire();
            this.cooldownTimer = this.getCooldown();
        }
    }
    fire() {}
}

class WeaponMeleeSweep extends WeaponBase {
    fire() {
        const p = this.scene.player;
        const area = this.getArea();
        const dmg = this.getDamage();
        const dir = p.facing || 1;
        const sweep = this.scene.projectiles.get(p.x + dir * 30 * area, p.y, 'proj_sweep');
        if (!sweep) return;
        sweep.setActive(true).setVisible(true).setScale(area, area);
        sweep.body.enable = true;
        sweep.setFlipX(dir < 0);
        sweep.dmg = dmg; sweep.pierce = 999; sweep.knockback = this.data.knockback;
        sweep.weaponId = this.id; sweep.hitEnemies = new Set();
        sweep.body.setSize(60 * area, 28 * area);
        sweep.setAlpha(0.7);
        this.scene.tweens.add({ targets: sweep, alpha: 0, scaleX: area * 1.3, duration: 250,
            onComplete: () => { sweep.setActive(false).setVisible(false); sweep.body.stop(); }
        });
    }
}

class WeaponAutoTarget extends WeaponBase {
    fire() {
        const p = this.scene.player;
        const count = this.getProjectileCount();
        const dmg = this.getDamage();
        const enemies = [];
        const nearby = this.scene.spatialHash.getNearby(p.x, p.y, 800);
        for (const e of nearby) {
            if (e.active && e.hp > 0) enemies.push(e);
        }
        enemies.sort((a, b) => {
            const da = (a.x - p.x) ** 2 + (a.y - p.y) ** 2;
            const db = (b.x - p.x) ** 2 + (b.y - p.y) ** 2;
            return da - db;
        });
        for (let i = 0; i < Math.min(count, Math.max(1, enemies.length)); i++) {
            const target = enemies[i % enemies.length];
            if (!target) break;
            const proj = this.scene.projectiles.get(p.x, p.y, 'proj_w02');
            if (!proj) continue;
            proj.setActive(true).setVisible(true).setScale(0.8);
            proj.body.enable = true;
            const angle = Math.atan2(target.y - p.y, target.x - p.x);
            const speed = 400 * (1 + (this.scene.player.stats.projectileSpeed || 0));
            proj.body.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
            proj.dmg = dmg; proj.pierce = this.evolved ? 999 : this.data.pierce;
            proj.knockback = this.data.knockback; proj.weaponId = this.id;
            proj.hitEnemies = new Set(); proj.life = 3;
        }
    }
}

class WeaponBarrage extends WeaponBase {
    fire() {
        const p = this.scene.player;
        const count = this.getProjectileCount();
        const dmg = this.getDamage();
        const baseAngle = Math.atan2(p.lastDY || 0, p.lastDX || 1);
        const spread = 0.15;
        for (let i = 0; i < count; i++) {
            const angle = baseAngle + (i - (count - 1) / 2) * spread;
            const proj = this.scene.projectiles.get(p.x, p.y, 'proj_w03');
            if (!proj) continue;
            proj.setActive(true).setVisible(true).setScale(0.7);
            proj.body.enable = true;
            const speed = 350 * (1 + (this.scene.player.stats.projectileSpeed || 0));
            proj.body.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
            proj.dmg = dmg; proj.pierce = this.data.pierce; proj.knockback = this.evolved ? 120 : this.data.knockback;
            proj.weaponId = this.id; proj.hitEnemies = new Set(); proj.life = 2;
        }
    }
}

class WeaponArcLob extends WeaponBase {
    fire() {
        const p = this.scene.player;
        const count = this.getProjectileCount();
        const dmg = this.getDamage();
        const area = this.getArea();
        for (let i = 0; i < count; i++) {
            const target = this.scene.spatialHash.findNearest(p.x, p.y, 600, e => e.active && e.hp > 0);
            let tx, ty;
            if (target) { tx = target.x; ty = target.y; }
            else { tx = p.x + Phaser.Math.Between(-200, 200); ty = p.y + Phaser.Math.Between(-200, 200); }
            const proj = this.scene.projectiles.get(p.x, p.y, 'proj_w04');
            if (!proj) continue;
            proj.setActive(true).setVisible(true).setScale(1);
            proj.body.enable = true;
            proj.dmg = dmg; proj.pierce = this.data.pierce; proj.knockback = this.data.knockback;
            proj.weaponId = this.id; proj.hitEnemies = new Set(); proj.life = 3;
            proj.isLob = true; proj.lobTime = 0; proj.lobDuration = 0.6;
            proj.startX = p.x; proj.startY = p.y; proj.targetX = tx; proj.targetY = ty;
            proj.lobArea = area;
            proj.body.setVelocity(0, 0);
        }
    }
}

class WeaponAura extends WeaponBase {
    constructor(scene, weaponId, level) {
        super(scene, weaponId, level);
        this.auraGraphics = null;
        this.auraDamageTimer = 0;
    }
    update(time, delta) {
        const dt = delta / 1000;
        const p = this.scene.player;
        const area = this.getArea();
        const radius = 64 * area;
        if (!this.auraGraphics) {
            this.auraGraphics = this.scene.add.circle(p.x, p.y, radius, Phaser.Display.Color.HexStringToColor(this.data.color).color, 0.15);
            this.auraGraphics.setDepth(5);
            this.auraGraphics.setStrokeStyle(2, Phaser.Display.Color.HexStringToColor(this.data.color).color, 0.4);
        }
        this.auraGraphics.setPosition(p.x, p.y);
        this.auraGraphics.setRadius(radius);
        this.auraDamageTimer -= dt;
        if (this.auraDamageTimer <= 0) {
            this.auraDamageTimer = this.getCooldown();
            const dmg = this.getDamage();
            const nearby = this.scene.spatialHash.getNearby(p.x, p.y, radius + 50);
            for (const e of nearby) {
                if (!e.active || e.hp <= 0) continue;
                const dx = e.x - p.x, dy = e.y - p.y;
                if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                    this.scene.damageEnemy(e, dmg, this.data.knockback, p.x, p.y, this.id);
                    if (this.evolved && this.evoId === 'evo_05') {
                        const healAmt = dmg * 0.05 * (1 + (1 - p.hp / p.stats.maxHp));
                        p.hp = Math.min(p.stats.maxHp, p.hp + healAmt);
                    }
                }
            }
        }
    }
    destroy() { if (this.auraGraphics) this.auraGraphics.destroy(); }
}

class WeaponGroundPool extends WeaponBase {
    fire() {
        const p = this.scene.player;
        const area = this.getArea();
        const dmg = this.getDamage();
        const count = this.getProjectileCount();
        for (let i = 0; i < count; i++) {
            const ox = Phaser.Math.Between(-200, 200);
            const oy = Phaser.Math.Between(-200, 200);
            const px = p.x + ox, py = p.y + oy;
            const radius = 40 * area;
            const pool = this.scene.add.circle(px, py, radius, Phaser.Display.Color.HexStringToColor(this.data.color).color, 0.25);
            pool.setDepth(3);
            pool.setStrokeStyle(1, Phaser.Display.Color.HexStringToColor(this.data.color).color, 0.5);
            const poolData = { x: px, y: py, radius, dmg, life: 3, tickTimer: 0, gfx: pool, weaponId: this.id };
            if (!this.scene.groundPools) this.scene.groundPools = [];
            this.scene.groundPools.push(poolData);
            this.scene.tweens.add({ targets: pool, alpha: 0, duration: 3000, onComplete: () => pool.destroy() });
        }
    }
}

class WeaponOrbit extends WeaponBase {
    constructor(scene, weaponId, level) {
        super(scene, weaponId, level);
        this.orbitals = [];
        this.orbitAngle = 0;
    }
    update(time, delta) {
        const dt = delta / 1000;
        const p = this.scene.player;
        const count = this.getProjectileCount();
        const area = this.getArea();
        const radius = 80 * area;
        while (this.orbitals.length < count) {
            const orb = this.scene.add.sprite(p.x, p.y, 'proj_w07');
            orb.setDepth(10); orb.setScale(1.2);
            orb.dmg = this.getDamage(); orb.knockback = this.data.knockback;
            orb.weaponId = this.id; orb.hitCooldowns = new Map();
            this.orbitals.push(orb);
        }
        while (this.orbitals.length > count) {
            const orb = this.orbitals.pop();
            orb.destroy();
        }
        this.orbitAngle += dt * 3;
        for (let i = 0; i < this.orbitals.length; i++) {
            const angle = this.orbitAngle + (Math.PI * 2 / this.orbitals.length) * i;
            const orb = this.orbitals[i];
            orb.setPosition(p.x + Math.cos(angle) * radius, p.y + Math.sin(angle) * radius);
            orb.dmg = this.getDamage();
            const nearby = this.scene.spatialHash.getNearby(orb.x, orb.y, 30);
            for (const e of nearby) {
                if (!e.active || e.hp <= 0) continue;
                const dx = e.x - orb.x, dy = e.y - orb.y;
                if (dx * dx + dy * dy < 900) {
                    const lastHit = orb.hitCooldowns.get(e);
                    if (lastHit && time - lastHit < 500) continue;
                    orb.hitCooldowns.set(e, time);
                    this.scene.damageEnemy(e, orb.dmg, this.data.knockback, orb.x, orb.y, this.id);
                }
            }
        }
    }
    destroy() { for (const o of this.orbitals) o.destroy(); }
}

class WeaponRandomStrike extends WeaponBase {
    fire() {
        const p = this.scene.player;
        const dmg = this.getDamage();
        const area = this.getArea();
        const count = this.getProjectileCount();
        const nearby = this.scene.spatialHash.getNearby(p.x, p.y, 600);
        const activeEnemies = nearby.filter(e => e.active && e.hp > 0);
        for (let i = 0; i < count; i++) {
            let tx, ty;
            if (activeEnemies.length > 0) {
                const target = activeEnemies[Phaser.Math.Between(0, activeEnemies.length - 1)];
                tx = target.x; ty = target.y;
            } else {
                tx = p.x + Phaser.Math.Between(-300, 300);
                ty = p.y + Phaser.Math.Between(-300, 300);
            }
            const radius = 48 * area;
            const flash = this.scene.add.circle(tx, ty, radius, 0xFFF9C4, 0.6);
            flash.setDepth(15);
            this.scene.tweens.add({ targets: flash, alpha: 0, scaleX: 1.5, scaleY: 1.5, duration: 300,
                onComplete: () => flash.destroy()
            });
            const hit = this.scene.spatialHash.getNearby(tx, ty, radius + 20);
            for (const e of hit) {
                if (!e.active || e.hp <= 0) continue;
                const dx = e.x - tx, dy = e.y - ty;
                if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                    this.scene.damageEnemy(e, dmg, this.data.knockback, tx, ty, this.id);
                }
            }
            if (this.evolved && this.evoId === 'evo_08') {
                this.scene.time.delayedCall(300, () => {
                    const flash2 = this.scene.add.circle(tx, ty, radius * 1.2, 0xFFFF8D, 0.8);
                    flash2.setDepth(15);
                    this.scene.tweens.add({ targets: flash2, alpha: 0, scaleX: 1.8, scaleY: 1.8, duration: 300, onComplete: () => flash2.destroy() });
                    const hit2 = this.scene.spatialHash.getNearby(tx, ty, radius * 1.2 + 20);
                    for (const e of hit2) {
                        if (!e.active || e.hp <= 0) continue;
                        const dx2 = e.x - tx, dy2 = e.y - ty;
                        if (Math.sqrt(dx2 * dx2 + dy2 * dy2) <= radius * 1.2) {
                            this.scene.damageEnemy(e, dmg * 3, this.data.knockback, tx, ty, this.id);
                        }
                    }
                });
            }
        }
    }
}

class WeaponBounce extends WeaponBase {

class WeaponFreezeBeam extends WeaponBase {
    constructor(scene, weaponId, level) {
        super(scene, weaponId, level);
        this.beamAngle = 0;
        this.beamGfx = null;
    }
    update(time, delta) {
        const dt = delta / 1000;
        const p = this.scene.player;
        const area = this.getArea();
        const beamLength = 200 * area;
        this.beamAngle += dt * 1.5;
        if (!this.beamGfx) {
            this.beamGfx = this.scene.add.graphics();
            this.beamGfx.setDepth(12);
        }
        this.beamGfx.clear();
        const bx = p.x + Math.cos(this.beamAngle) * beamLength;
        const by = p.y + Math.sin(this.beamAngle) * beamLength;
        this.beamGfx.lineStyle(6 * area, 0xE1F5FE, 0.6);
        this.beamGfx.beginPath();
        this.beamGfx.moveTo(p.x, p.y);
        this.beamGfx.lineTo(bx, by);
        this.beamGfx.strokePath();
        const steps = 10;
        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const sx = p.x + (bx - p.x) * t;
            const sy = p.y + (by - p.y) * t;
            const nearby = this.scene.spatialHash.getNearby(sx, sy, 30 * area);
            for (const e of nearby) {
                if (!e.active || e.hp <= 0 || e.isBoss) continue;
                const dx = e.x - sx, dy = e.y - sy;
                if (dx * dx + dy * dy < (30 * area) ** 2) {
                    const dur = 2 * (1 + (this.scene.player.stats.effectDuration || 0));
                    e.freezeTimer = dur;
                    e.setTint(0xE1F5FE);
                    if (this.evolved && this.evoId === 'evo_10') {
                        e.hp = Math.floor(e.hp * 0.5);
                        if (e.hp <= 0) this.scene.killEnemy(e);
                    }
                }
            }
        }
    }
    destroy() { if (this.beamGfx) this.beamGfx.destroy(); }
}
