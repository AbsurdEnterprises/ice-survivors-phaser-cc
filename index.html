                    this.updateCharSelection();
                });
            }
            this.charCards.push({ card, key, unlocked, nameText, icon });
        }
        this.updateCharSelection();

        // Meta upgrades
        this.add.text(100, 330, 'META UPGRADES', { fontSize: '16px', fontFamily: 'monospace', color: '#FFC107' });
        this.metaButtons = [];
        const metaKeys = Object.keys(META_UPGRADE_DATA);
        for (let i = 0; i < metaKeys.length; i++) {
            const key = metaKeys[i];
            const md = META_UPGRADE_DATA[key];
            const y = 365 + i * 40;
            const curLevel = saveData.metaLevels[key] || 0;
            const cost = curLevel >= md.maxLevel ? 'MAX' : Math.floor(md.baseCost * (1.5 * (curLevel + 1)));
            const bg = this.add.rectangle(200, y, 320, 30, 0x1A1A2E).setStrokeStyle(1, 0x333333);
            const label = this.add.text(55, y, `${md.desc} [${curLevel}/${md.maxLevel}]`, {
                fontSize: '12px', fontFamily: 'monospace', color: '#ECEFF1'
            }).setOrigin(0, 0.5);
            const costText = this.add.text(340, y, cost === 'MAX' ? 'MAX' : `${cost}G`, {
                fontSize: '12px', fontFamily: 'monospace', color: curLevel >= md.maxLevel ? '#666' : '#FFC107'
            }).setOrigin(0.5);
            if (curLevel < md.maxLevel) {
                bg.setInteractive({ useHandCursor: true });
                bg.on('pointerdown', () => {
                    const c = Math.floor(md.baseCost * (1.5 * (curLevel + 1)));
                    if (saveData.gold >= c) {
                        saveData.gold -= c;
                        saveData.metaLevels[key] = curLevel + 1;
                        saveSaveData(saveData);
                        this.scene.restart();
                    }
                });
            }
            this.metaButtons.push({ bg, label, costText });
        }

        // Stage select
        this.selectedStage = 'stage_01';
        this.add.text(550, 330, 'STAGE', { fontSize: '16px', fontFamily: 'monospace', color: '#FFC107' });
        const stages = [
            { id: 'stage_01', name: 'URBAN AVE', color: '#4FC3F7' },
            { id: 'stage_02', name: 'THE MALL', color: '#AB47BC' },
            { id: 'stage_03', name: 'WILDERNESS', color: '#66BB6A' }
        ];
        this.stageButtons = [];
        for (let i = 0; i < stages.length; i++) {
            const s = stages[i];
            const unlocked = saveData.unlockedStages.includes(s.id);
            const y = 365 + i * 40;
            const bg = this.add.rectangle(640, y, 180, 30, unlocked ? 0x1A1A2E : 0x111111).setStrokeStyle(1, unlocked ? 0x555555 : 0x222222);
            const label = this.add.text(640, y, unlocked ? s.name : 'LOCKED', {
                fontSize: '13px', fontFamily: 'monospace', color: unlocked ? s.color : '#444'
            }).setOrigin(0.5);
            if (unlocked) {
                bg.setInteractive({ useHandCursor: true });
                bg.on('pointerdown', () => {
                    this.selectedStage = s.id;
                    this.updateStageSelection();
                });
            }
            this.stageButtons.push({ bg, id: s.id, unlocked });
        }
        this.updateStageSelection();

        // Start button
        const startBtn = this.add.rectangle(640, 560, 240, 50, 0xFFC107).setStrokeStyle(2, 0xFFD54F);
        const startText = this.add.text(640, 560, 'START RUN', {
            fontSize: '22px', fontFamily: 'monospace', fontStyle: 'bold', color: '#0B0E17'
        }).setOrigin(0.5);
        startBtn.setInteractive({ useHandCursor: true });
        startBtn.on('pointerdown', () => {
            this.scene.start('GameScene', { character: this.selectedChar, stage: this.selectedStage });
        });
        this.tweens.add({ targets: [startBtn, startText], scaleX: 1.05, scaleY: 1.05, duration: 600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

        // Instructions
        this.add.text(640, 640, 'WASD / ARROWS TO MOVE    AUTO-ATTACK WEAPONS', {
            fontSize: '12px', fontFamily: 'monospace', color: '#666'
        }).setOrigin(0.5);
        this.add.text(640, 660, 'SURVIVE 30 MINUTES', {
            fontSize: '12px', fontFamily: 'monospace', color: '#666'
        }).setOrigin(0.5);

        // Best time
        if (saveData.bestTime > 0) {
            const m = Math.floor(saveData.bestTime / 60);
            const s = Math.floor(saveData.bestTime % 60);
            this.add.text(640, 690, `BEST: ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}  KILLS: ${saveData.totalKills}`, {
                fontSize: '11px', fontFamily: 'monospace', color: '#888'
            }).setOrigin(0.5);
        }
    }
    updateCharSelection() {
        for (const c of this.charCards) {
            const sel = c.key === this.selectedChar;
            const colorVal = c.unlocked ? (sel ? 0xFFC107 : 0x555555) : 0x222222;
            c.card.setStrokeStyle(sel ? 3 : 2, colorVal);
        }
    }
    updateStageSelection() {
        for (const s of this.stageButtons) {
            const sel = s.id === this.selectedStage;
            if (s.unlocked) s.bg.setStrokeStyle(sel ? 3 : 1, sel ? 0xFFC107 : 0x555555);
        }
    }
}

// === GAME SCENE ===
class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }

    init(data) {
        this.characterId = data.character || 'char_01';
        this.stageId = data.stage || 'stage_01';
    }

    create() {
        this.cameras.main.setBackgroundColor(0x0B0E17);
        const charData = CHARACTER_DATA[this.characterId];

        // Player
        this.player = this.physics.add.sprite(0, 0, 'player');
        this.player.setDepth(50);
        this.player.setCollideWorldBounds(false);
        this.player.body.setSize(20, 24);
        this.player.stats = {
            maxHp: charData.stats.maxHp, moveSpeed: charData.stats.moveSpeed,
            xpRadius: charData.stats.xpRadius, armor: charData.stats.armor,
            luck: charData.stats.luck, area: charData.stats.area, damage: charData.stats.damage,
            cooldownReduction: 0, projectileSpeed: 0, hpRegen: 0, effectDuration: 0, damageBonus: 0
        };
        // Apply meta upgrades
        for (const [key, md] of Object.entries(META_UPGRADE_DATA)) {
            const lvl = saveData.metaLevels[key] || 0;
            if (lvl > 0 && md.stat !== 'revive') {
                if (this.player.stats[md.stat] !== undefined) {
                    this.player.stats[md.stat] += md.bonusPerLevel * lvl;
                }
            }
        }
        this.player.hp = this.player.stats.maxHp;
        this.player.isInvulnerable = false;
        this.player.facing = 1;
        this.player.lastDX = 1; this.player.lastDY = 0;
        this.player.level = 1;
        this.player.xp = 0;
        this.player.xpToNext = this.xpRequired(2);
        this.player.weapons = [];
        this.player.passives = {};
        this.player.passiveLevels = {};
        this.player.kills = 0;
        this.player.goldEarned = 0;
        this.player.hasRevive = (saveData.metaLevels.meta_04 || 0) > 0;
        this.player.reviveUsed = false;

        // Camera
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.cameras.main.setDeadzone(50, 50);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys({ w: 'W', a: 'A', s: 'S', d: 'D' });

        // Spatial hash
        this.spatialHash = new SpatialHashGrid(128);

        // Groups
        this.enemies = this.physics.add.group({ maxSize: 500, runChildUpdate: false });
        this.projectiles = this.physics.add.group({ maxSize: 1000, runChildUpdate: false });
        this.xpGems = this.physics.add.group({ maxSize: 300, runChildUpdate: false });
        this.pickups = this.physics.add.group({ maxSize: 50, runChildUpdate: false });
        this.chests = this.physics.add.group({ maxSize: 10, runChildUpdate: false });
        this.destructibles = this.physics.add.group({ maxSize: 100, runChildUpdate: false });
        this.enemyProjectiles = this.physics.add.group({ maxSize: 200, runChildUpdate: false });

        // Ground pools
        this.groundPools = [];
        this._passiveIcons = [];

        // Overlaps
        this.physics.add.overlap(this.projectiles, this.enemies, this.onProjectileHitEnemy, null, this);
        this.physics.add.overlap(this.enemies, this.player, this.onEnemyHitPlayer, null, this);
        this.physics.add.overlap(this.player, this.xpGems, this.onCollectGem, null, this);
        this.physics.add.overlap(this.player, this.pickups, this.onCollectPickup, null, this);
        this.physics.add.overlap(this.player, this.chests, this.onCollectChest, null, this);
        this.physics.add.overlap(this.projectiles, this.destructibles, this.onProjectileHitDestructible, null, this);
        this.physics.add.overlap(this.enemyProjectiles, this.player, this.onEnemyProjHitPlayer, null, this);

        // Timers
        this.runTime = 0;
        this.spawnTimer = 0;
        this.hazardTimer = 45;
        this.destructibleTimer = 0;
        this.regenTimer = 0;
        this.bossesSpawned = { boss_01: false, boss_02: false, boss_final: false };
        this.activeBosses = [];
        this.isPaused = false;
        this.damageNumbers = [];

        // Give starting weapon
        this.addWeapon(charData.startWeapon);

        // Background
        this.createBackground();

        // Snow
        this.add.particles(0, -50, 'particle', {
            x: { min: -640, max: 1920 }, y: -50,
            speedY: { min: 20, max: 60 }, speedX: { min: -10, max: 10 },
            alpha: { min: 0.2, max: 0.5 }, lifespan: 8000,
            scale: { min: 0.3, max: 0.6 }, quantity: 1, frequency: 100
        }).setScrollFactor(0.5).setDepth(1);

        // Vignette
        const vig = this.add.image(640, 360, 'vignette');
        vig.setScrollFactor(0).setDepth(900).setAlpha(0.3);

        // Particle emitter for death bursts
        this.deathEmitter = this.add.particles(0, 0, 'particle', {
            speed: { min: 80, max: 200 }, lifespan: 300,
            alpha: { start: 1, end: 0 }, scale: { start: 0.5, end: 0 },
            emitting: false
        });
        this.deathEmitter.setDepth(60);

        // Level up burst emitter
        this.levelUpEmitter = this.add.particles(0, 0, 'particle', {
            speed: 250, lifespan: 600,
            alpha: { start: 1, end: 0 }, scale: { start: 0.6, end: 0 },
            tint: 0xFFC107, emitting: false
        });
        this.levelUpEmitter.setDepth(60);

        // XP gem sparkle emitter
        this.gemSparkle = this.add.particles(0, 0, 'particle', {
            speed: 15, lifespan: 400,
            alpha: { start: 0.8, end: 0 }, scale: { start: 0.3, end: 0 },
            tint: 0xffffff, emitting: false, gravityY: -20
        });
        this.gemSparkle.setDepth(16);

        // Build HUD
        this.createHUD();

        // White flash overlay for screen effects
        this.flashOverlay = this.add.rectangle(640, 360, 1280, 720, 0xffffff, 0);
        this.flashOverlay.setScrollFactor(0).setDepth(950);
    }

    createBackground() {
        this.bgBuildings = [];
        if (this.stageId === 'stage_01') {
            // Building silhouettes for parallax
            for (let layer = 0; layer < 2; layer++) {
                const buildings = [];
                for (let i = -20; i < 30; i++) {
                    const w = Phaser.Math.Between(60, 140);
                    const h = Phaser.Math.Between(80, 250);
                    const x = i * 100 + Phaser.Math.Between(-20, 20);
                    const yTop = -360 - h;
                    const yBot = 360;
                    const alpha = layer === 0 ? 0.3 : 0.5;
                    const color = layer === 0 ? 0x0D1220 : 0x151B2B;
                    const bTop = this.add.rectangle(x, yTop + h / 2 - 200, w, h, color, alpha);
                    bTop.setScrollFactor(0.2 + layer * 0.1, 0.2 + layer * 0.1).setDepth(layer);
                    const bBot = this.add.rectangle(x, yBot + h / 2 + 50, w, h, color, alpha);
                    bBot.setScrollFactor(0.2 + layer * 0.1, 0.2 + layer * 0.1).setDepth(layer);
                    buildings.push(bTop, bBot);
                }
                this.bgBuildings.push(...buildings);
            }
            // Ground lines
            for (let i = -20; i < 20; i++) {
                const line = this.add.rectangle(i * 200, 0, 2, 720, 0x1A1A2E, 0.3);
                line.setScrollFactor(0.5).setDepth(0);
            }
        } else if (this.stageId === 'stage_02') {
            // Mall grid
            for (let gx = -10; gx < 10; gx++) {
                for (let gy = -10; gy < 10; gy++) {
                    if ((gx + gy) % 2 === 0) {
                        const tile = this.add.rectangle(gx * 256, gy * 256, 256, 256, 0x12151F, 0.5);
                        tile.setDepth(0);
                    }
                    // Grid lines
                    const lineH = this.add.rectangle(gx * 256, gy * 256 + 128, 256, 1, 0x222233, 0.2);
                    lineH.setDepth(0);
                    const lineV = this.add.rectangle(gx * 256 + 128, gy * 256, 1, 256, 0x222233, 0.2);
                    lineV.setDepth(0);
                }
            }
            // Kiosks
            this.kiosks = this.physics.add.staticGroup();
            for (let kx = -3; kx <= 3; kx++) {
                for (let ky = -3; ky <= 3; ky++) {
                    if (Math.abs(kx) < 1 && Math.abs(ky) < 1) continue;
                    const kiosk = this.add.rectangle(kx * 256, ky * 256, 64, 64, 0x2A2A3E);
                    kiosk.setStrokeStyle(2, 0x444466);
                    kiosk.setDepth(5);
                    const body = this.kiosks.create(kx * 256, ky * 256, null);
                    body.setVisible(false);
                    body.body.setSize(64, 64);
                    body.body.setOffset(-32, -32);
                }
            }
            this.physics.add.collider(this.player, this.kiosks);
        } else if (this.stageId === 'stage_03') {
            this.cameras.main.setBackgroundColor(0x0B1A0B);
            // Trees via Poisson-ish placement
            this.trees = this.physics.add.staticGroup();
            for (let i = 0; i < 200; i++) {
                const tx = Phaser.Math.Between(-2000, 2000);
                const ty = Phaser.Math.Between(-2000, 2000);
                if (Math.abs(tx) < 100 && Math.abs(ty) < 100) continue;
                const sz = Phaser.Math.Between(24, 48);
                const tree = this.add.circle(tx, ty, sz / 2, 0x1B5E20, 0.8);
                tree.setStrokeStyle(2, 0x0D3B0D);
                tree.setDepth(4);
                const body = this.trees.create(tx, ty, null);
                body.setVisible(false);
                body.body.setCircle(sz / 3);
                body.body.setOffset(-sz / 3, -sz / 3);
            }
            this.physics.add.collider(this.player, this.trees);
        }
    }

    createHUD() {
        // HP bar background
        this.hpBarBg = this.add.rectangle(120, 25, 200, 16, 0x1A1A2E).setScrollFactor(0).setDepth(1000);
        this.hpBarBg.setStrokeStyle(2, 0xECEFF1);
        this.hpBarFill = this.add.rectangle(21, 18, 198, 14, 0x66BB6A).setScrollFactor(0).setDepth(1001);
        this.hpBarFill.setOrigin(0, 0);

        // Level text
        this.levelText = new BitmapText(this, 20, 40, 'LV.1', 1);
        this.levelText.setScrollFactor(0);

        // Timer
        this.timerText = new BitmapText(this, 580, 10, '00:00', 1.5);
        this.timerText.setScrollFactor(0);

        // Kill counter
        this.killText = new BitmapText(this, 1150, 10, '0', 1);
        this.killText.setScrollFactor(0);

        // XP bar
        this.xpBarBg = this.add.rectangle(640, 712, 1280, 8, 0x1A1A2E).setScrollFactor(0).setDepth(1000);
        this.xpBarFill = this.add.rectangle(0, 708, 0, 8, 0x69F0AE).setScrollFactor(0).setDepth(1001);
        this.xpBarFill.setOrigin(0, 0);

        // Weapon slots
        this.weaponSlots = [];
        for (let i = 0; i < 6; i++) {
            const slot = this.add.rectangle(30 + i * 30, 690, 24, 24, 0x1A1A2E, 0.5);
            slot.setStrokeStyle(1, 0x555555);
            slot.setScrollFactor(0).setDepth(1000);
            this.weaponSlots.push(slot);
        }
        this.weaponIcons = [];

        // Passive slots
        this.passiveSlots = [];
        for (let i = 0; i < 6; i++) {
            const slot = this.add.rectangle(1100 + i * 30, 690, 24, 24, 0x1A1A2E, 0.5);
            slot.setStrokeStyle(1, 0x555555);
            slot.setScrollFactor(0).setDepth(1000);
            this.passiveSlots.push(slot);
        }

        // Warning text
        this.warningText = this.add.text(640, 200, '', {
            fontSize: '36px', fontFamily: 'monospace', fontStyle: 'bold', color: '#F44336'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(1002).setAlpha(0);
    }

    update(time, delta) {
        if (this.isPaused) return;
        const dt = delta / 1000;
        this.runTime += dt;

        // Player movement
        this.updatePlayerMovement(dt);

        // HP regen
        this.regenTimer += dt;
        if (this.regenTimer >= 1 && this.player.stats.hpRegen > 0) {
            this.regenTimer = 0;
            this.player.hp = Math.min(this.player.stats.maxHp, this.player.hp + this.player.stats.hpRegen);
        }

        // Enemy spawning
        this.updateSpawning(dt);

        // Update enemies
        this.updateEnemies(dt, time);

        // Update weapons
        for (const w of this.player.weapons) {
            w.update(time, delta);
        }

        // Update projectiles
        this.updateProjectiles(dt);

        // Update ground pools
        this.updateGroundPools(dt);

        // Update bosses
        this.updateBosses(dt, time);

        // Spawn destructibles
        this.updateDestructibleSpawning(dt);

        // XP gem attraction, sparkle, and aggregation
        this.attractGems();
        this.aggregateGems();
        // Sparkle on gems
        if (Math.random() < 0.1) {
            this.xpGems.children.each(g => {
                if (g.active && Math.random() < 0.05) {
                    this.gemSparkle.emitParticleAt(g.x, g.y, 1);
                }
            });
        }

        // Update spatial hash
        this.spatialHash.clear();
        this.enemies.children.each(e => { if (e.active) this.spatialHash.insert(e); });

        // Check boss spawns
        this.checkBossSpawns();

        // Hazard vehicle timer (Stage 1)
        if (this.stageId === 'stage_01') {
            this.hazardTimer -= dt;
            if (this.hazardTimer <= 0) {
                this.spawnHazardVehicle();
                this.hazardTimer = 45;
            }
        }

        // Update HUD
        this.updateHUD();

        // Update damage numbers
        this.updateDamageNumbers(dt);

        // Check bouncing projectile bounds
        this.updateBouncingProjectiles();

        // Update lob projectiles
        this.updateLobProjectiles(dt);
    }

    updatePlayerMovement(dt) {
        const p = this.player;
        let dx = 0, dy = 0;
        if (this.cursors.left.isDown || this.wasd.a.isDown) dx = -1;
        if (this.cursors.right.isDown || this.wasd.d.isDown) dx = 1;
        if (this.cursors.up.isDown || this.wasd.w.isDown) dy = -1;
        if (this.cursors.down.isDown || this.wasd.s.isDown) dy = 1;
        if (dx !== 0 || dy !== 0) {
            const len = Math.sqrt(dx * dx + dy * dy);
            dx /= len; dy /= len;
            p.lastDX = dx; p.lastDY = dy;
            if (dx !== 0) p.facing = dx > 0 ? 1 : -1;
        }
        p.body.setVelocity(dx * p.stats.moveSpeed, dy * p.stats.moveSpeed);
        p.setFlipX(p.facing < 0);
    }

    updateSpawning(dt) {
        this.spawnTimer -= dt;
        if (this.spawnTimer > 0) return;
        this.spawnTimer = 1.0;

        const t = this.runTime / 60; // minutes
        if (t >= 30) return; // final boss phase

        const bS = 8;
        const r = 0.12;
        let target = Math.min(500, Math.floor(bS * Math.pow(1 + r, t)));

        // Surge waves
        const surges = [
            { time: 5, count: 40 }, { time: 10, count: 80 }, { time: 15, count: 120 },
            { time: 20, count: 160 }, { time: 25, count: 200 }
        ];
        for (const s of surges) {
            const st = s.time * 60;
            if (this.runTime >= st && this.runTime <= st + 10) {
                target += Math.floor(s.count * ((this.runTime - st) / 10));
            }
        }
        target = Math.min(500, target);

        let activeCount = 0;
        this.enemies.children.each(e => { if (e.active) activeCount++; });
        const toSpawn = Math.min(15, target - activeCount);
        for (let i = 0; i < toSpawn; i++) {
            this.spawnEnemy();
        }
    }

    getEnemyClass() {
        const minutes = this.runTime / 60;
        let comp = ENEMY_COMPOSITION[0];
        for (const c of ENEMY_COMPOSITION) {
            if (minutes <= c.maxTime) { comp = c; break; }
            comp = c;
        }
        const roll = Math.random();
        let cumulative = 0;
        if ((cumulative += comp.fodder) > roll) return 'fodder_01';
        if ((cumulative += comp.erratic) > roll) return 'erratic_02';
        if ((cumulative += comp.tank) > roll) return 'tank_03';
        if ((cumulative += comp.ranged) > roll) return 'ranged_04';
        return 'fodder_01';
    }

    spawnEnemy() {
        const cls = this.getEnemyClass();
        const ed = ENEMY_DATA[cls];
        const textureMap = {
            fodder_01: 'enemy_fodder', erratic_02: 'enemy_elite',
            tank_03: 'enemy_tank', ranged_04: 'enemy_ranged'
        };
        const texture = textureMap[cls] || 'enemy_fodder';
        const p = this.player;
        const theta = Math.random() * Math.PI * 2;
        const sx = p.x + (640 + 80) * Math.cos(theta);
        const sy = p.y + (360 + 80) * Math.sin(theta);

        const enemy = this.enemies.get(sx, sy, texture);
        if (!enemy) return;
        enemy.setActive(true).setVisible(true);
        enemy.setPosition(sx, sy);
        enemy.body.enable = true;
        enemy.setDepth(20);
        enemy.body.setSize(enemy.width * 0.8, enemy.height * 0.8);

        const t = this.runTime / 60;
        enemy.hp = Math.floor(ed.hBase * (1 + t * 0.15) * ed.cMod);
        enemy.maxHp = enemy.hp;
        enemy.speed = ed.vBase + (t * 0.02 * ed.vBase);
        enemy.contactDmg = ed.contactDmg;
        enemy.xpValue = ed.xpValue;
        enemy.enemyClass = cls;
        enemy.behavior = ed.behavior;
        enemy.noKnockback = ed.noKnockback || false;
        enemy.isBoss = false;
        enemy.freezeTimer = 0;
        enemy.pauseTimer = 0;
        enemy.fireTimer = cls === 'ranged_04' ? 3 : 0;
        enemy.orbitAngle = Math.random() * Math.PI * 2;

        // Breathing tween
        if (cls === 'fodder_01') {
            this.tweens.add({
                targets: enemy, scaleX: 1.05, scaleY: 1.05,
                duration: 400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
            });
        }
    }

    updateEnemies(dt, time) {
        const p = this.player;
        this.enemies.children.each(enemy => {
            if (!enemy.active) return;

            // Freeze check
            if (enemy.freezeTimer > 0) {
                enemy.freezeTimer -= dt;
                enemy.body.setVelocity(0, 0);
                if (enemy.freezeTimer <= 0) {
                    enemy.clearTint();
                }
                return;
            }

            // Despawn if too far
            const distSq = (enemy.x - p.x) ** 2 + (enemy.y - p.y) ** 2;
            if (distSq > 1500 * 1500) {
                enemy.setActive(false).setVisible(false);
                enemy.body.enable = false;
                return;
            }

            const dx = p.x - enemy.x;
            const dy = p.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            switch (enemy.behavior) {
                case 'direct':
                    if (dist > 5) {
                        enemy.body.setVelocity((dx / dist) * enemy.speed, (dy / dist) * enemy.speed);
                    }
                    break;
                case 'erratic':
                    enemy.pauseTimer -= dt;
                    if (enemy.pauseTimer <= 0) {
                        if (enemy.body.velocity.x === 0 && enemy.body.velocity.y === 0) {
                            if (dist > 5) enemy.body.setVelocity((dx / dist) * enemy.speed, (dy / dist) * enemy.speed);
                            enemy.pauseTimer = 0.5 + Math.random() * 1.5;
                        } else {
                            enemy.body.setVelocity(0, 0);
                            enemy.pauseTimer = 0.2 + Math.random() * 0.5;
                        }
                    } else if (dist > 5 && enemy.body.velocity.x !== 0) {
                        enemy.body.setVelocity((dx / dist) * enemy.speed, (dy / dist) * enemy.speed);
                    }
                    break;
                case 'ranged':
                    const orbitDist = 400;
                    if (dist > orbitDist + 50) {
                        enemy.body.setVelocity((dx / dist) * enemy.speed * 1.5, (dy / dist) * enemy.speed * 1.5);
                    } else if (dist < orbitDist - 50) {
                        enemy.body.setVelocity((-dx / dist) * enemy.speed, (-dy / dist) * enemy.speed);
                    } else {
                        enemy.orbitAngle += dt * 0.8;
                        const ox = p.x + Math.cos(enemy.orbitAngle) * orbitDist;
                        const oy = p.y + Math.sin(enemy.orbitAngle) * orbitDist;
                        const tdx = ox - enemy.x, tdy = oy - enemy.y;
                        const td = Math.sqrt(tdx * tdx + tdy * tdy);
                        if (td > 5) enemy.body.setVelocity((tdx / td) * enemy.speed * 1.5, (tdy / td) * enemy.speed * 1.5);
                    }
                    // Fire projectile
                    enemy.fireTimer -= dt;
                    if (enemy.fireTimer <= 0) {
                        enemy.fireTimer = 3;
                        this.fireEnemyProjectile(enemy);
                    }
                    break;
                case 'linear':
                    // Hazard vehicles keep their velocity, no AI needed
                    break;
            }
        });
    }

    fireEnemyProjectile(enemy) {
        const p = this.player;
        const proj = this.enemyProjectiles.get(enemy.x, enemy.y, 'proj_enemy');
        if (!proj) return;
        proj.setActive(true).setVisible(true);
        proj.body.enable = true;
        const dx = p.x - enemy.x, dy = p.y - enemy.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const speed = 200;
        proj.body.setVelocity((dx / dist) * speed, (dy / dist) * speed);
        proj.dmg = enemy.contactDmg;
        proj.life = 5;
    }

    updateProjectiles(dt) {
        this.projectiles.children.each(proj => {
            if (!proj.active) return;
            if (proj.isLob) return; // handled separately
            proj.life -= dt;
            if (proj.life <= 0) {
                proj.setActive(false).setVisible(false);
                proj.body.stop();
                return;
            }
        });
        this.enemyProjectiles.children.each(proj => {
            if (!proj.active) return;
            proj.life -= dt;
            if (proj.life <= 0) {
                proj.setActive(false).setVisible(false);
                proj.body.enable = false;
                proj.body.stop();
            }
        });
    }

    updateLobProjectiles(dt) {
        this.projectiles.children.each(proj => {
            if (!proj.active || !proj.isLob) return;
            proj.lobTime += dt;
            const t = proj.lobTime / proj.lobDuration;
            if (t >= 1) {
                // Land - do AoE damage
                const radius = 40 * proj.lobArea;
                const flash = this.add.circle(proj.targetX, proj.targetY, radius, 0xFFAB91, 0.5);
                flash.setDepth(15);
                this.tweens.add({ targets: flash, alpha: 0, scaleX: 1.3, scaleY: 1.3, duration: 300, onComplete: () => flash.destroy() });
                const nearby = this.spatialHash.getNearby(proj.targetX, proj.targetY, radius + 20);
                for (const e of nearby) {
                    if (!e.active || e.hp <= 0) continue;
                    const dx = e.x - proj.targetX, dy = e.y - proj.targetY;
                    if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                        this.damageEnemy(e, proj.dmg, proj.knockback, proj.targetX, proj.targetY, proj.weaponId);
                    }
                }
                proj.setActive(false).setVisible(false);
                proj.body.stop();
                proj.isLob = false;
                return;
            }
            // Parabolic movement
            const x = proj.startX + (proj.targetX - proj.startX) * t;
            const y = proj.startY + (proj.targetY - proj.startY) * t - Math.sin(t * Math.PI) * 100;
            proj.setPosition(x, y);
            proj.setScale(0.5 + Math.sin(t * Math.PI) * 0.5);
        });
    }

    updateBouncingProjectiles() {
        const cam = this.cameras.main;
        const left = cam.scrollX;
        const right = cam.scrollX + cam.width;
        const top = cam.scrollY;
        const bottom = cam.scrollY + cam.height;
        this.projectiles.children.each(proj => {
            if (!proj.active || !proj.isBouncing) return;
            if (proj.x < left) { proj.x = left; proj.body.velocity.x *= -1; if (proj.evoExplode) this.bounceExplosion(proj); }
            if (proj.x > right) { proj.x = right; proj.body.velocity.x *= -1; if (proj.evoExplode) this.bounceExplosion(proj); }
            if (proj.y < top) { proj.y = top; proj.body.velocity.y *= -1; if (proj.evoExplode) this.bounceExplosion(proj); }
            if (proj.y > bottom) { proj.y = bottom; proj.body.velocity.y *= -1; if (proj.evoExplode) this.bounceExplosion(proj); }
        });
    }

    bounceExplosion(proj) {
        const radius = 60;
        const flash = this.add.circle(proj.x, proj.y, radius, 0xCFD8DC, 0.4);
        flash.setDepth(15);
        this.tweens.add({ targets: flash, alpha: 0, scaleX: 1.5, scaleY: 1.5, duration: 200, onComplete: () => flash.destroy() });
        const nearby = this.spatialHash.getNearby(proj.x, proj.y, radius + 20);
        for (const e of nearby) {
            if (!e.active || e.hp <= 0) continue;
            const dx = e.x - proj.x, dy = e.y - proj.y;
            if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                this.damageEnemy(e, proj.dmg, 20, proj.x, proj.y, proj.weaponId);
            }
        }
    }

    updateGroundPools(dt) {
        for (let i = this.groundPools.length - 1; i >= 0; i--) {
            const pool = this.groundPools[i];
            pool.life -= dt;
            pool.tickTimer -= dt;
            if (pool.life <= 0) {
                this.groundPools.splice(i, 1);
                continue;
            }
            if (pool.tickTimer <= 0) {
                pool.tickTimer = 0.5;
                const nearby = this.spatialHash.getNearby(pool.x, pool.y, pool.radius + 20);
                for (const e of nearby) {
                    if (!e.active || e.hp <= 0) continue;
                    const dx = e.x - pool.x, dy = e.y - pool.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= pool.radius) {
                        this.damageEnemy(e, pool.dmg, 5, pool.x, pool.y, pool.weaponId);
                    }
                }
            }
        }
    }

    onProjectileHitEnemy(proj, enemy) {
        if (!proj.active || !enemy.active) return;
        if (enemy.hp <= 0) return;
        if (proj.isLob) return;
        if (proj.hitEnemies && proj.hitEnemies.has(enemy)) return;
        if (proj.hitEnemies) proj.hitEnemies.add(enemy);

        this.damageEnemy(enemy, proj.dmg, proj.knockback || 10, proj.x, proj.y, proj.weaponId);

        if (proj.pierce !== undefined && proj.pierce !== 999) {
            proj.pierce--;
            if (proj.pierce <= 0) {
                proj.setActive(false).setVisible(false);
                proj.body.stop();
            }
        }
    }

    damageEnemy(enemy, dmg, knockback, fromX, fromY, weaponId) {
        if (!enemy.active || enemy.hp <= 0) return;
        enemy.hp -= dmg;

        // Damage number
        this.spawnDamageNumber(enemy.x, enemy.y - 15, dmg);

        // Flash tint
        enemy.setTint(0xffffff);
        this.time.delayedCall(80, () => { if (enemy.active) enemy.clearTint(); });

        // Knockback
        if (!enemy.noKnockback && knockback > 0) {
            const dx = enemy.x - fromX;
            const dy = enemy.y - fromY;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            enemy.body.setVelocity(
                enemy.body.velocity.x + (dx / dist) * knockback,
                enemy.body.velocity.y + (dy / dist) * knockback
            );
        }

        if (enemy.hp <= 0) {
            this.killEnemy(enemy);
        }

        // Evo_01 heal on hit
        if (weaponId === 'weapon_01') {
            const w = this.player.weapons.find(w => w.id === 'weapon_01');
            if (w && w.evolved && w.evoId === 'evo_01') {
                this.player.hp = Math.min(this.player.stats.maxHp, this.player.hp + dmg * 0.05);
            }
        }
    }

    killEnemy(enemy) {
        // Death particles
        const tintColors = {
            fodder_01: 0xEF5350, erratic_02: 0xAB47BC, tank_03: 0xFF7043, ranged_04: 0x66BB6A
        };
        const tint = enemy.isBoss ? Phaser.Display.Color.HexStringToColor(BOSS_DATA[enemy.bossId]?.color || '#fff').color : (tintColors[enemy.enemyClass] || 0xffffff);
        this.deathEmitter.setParticleTint(tint);
        this.deathEmitter.emitParticleAt(enemy.x, enemy.y, Phaser.Math.Between(8, 15));

        // Drop XP
        if (enemy.xpValue > 0) {
            this.spawnXPGem(enemy.x, enemy.y, enemy.xpValue);
        }

        // Kill count
        this.player.kills++;

        // Deactivate
        enemy.setActive(false).setVisible(false);
        enemy.body.enable = false;
        enemy.body.stop();

        // Boss death
        if (enemy.isBoss && enemy.bossId) {
            const idx = this.activeBosses.indexOf(enemy);
            if (idx >= 0) this.activeBosses.splice(idx, 1);
            if (enemy.bossHpBar) enemy.bossHpBar.destroy();
            if (enemy.bossHpBg) enemy.bossHpBg.destroy();
            // Drop chest
            if (BOSS_DATA[enemy.bossId]?.drops === 'treasure_chest') {
                this.spawnChest(enemy.x, enemy.y);
            }
            // Unlock check
            if (enemy.bossId === 'boss_01') {
                if (!saveData.unlockedStages.includes('stage_02')) {
                    saveData.unlockedStages.push('stage_02');
                    saveSaveData(saveData);
                }
                // Unlock chars on first boss kill
                if (!saveData.unlockedCharacters.includes('char_02')) {
                    saveData.unlockedCharacters.push('char_02');
                    saveSaveData(saveData);
                }
                if (!saveData.unlockedCharacters.includes('char_03')) {
                    saveData.unlockedCharacters.push('char_03');
                    saveSaveData(saveData);
                }
            }
        }
    }

    onEnemyHitPlayer(enemy, player) {
        if (!enemy.active || this.player.isInvulnerable) return;
        if (enemy.hp <= 0) return;
        const rawDmg = enemy.contactDmg || 5;
        const dmg = Math.max(1, rawDmg - this.player.stats.armor);
        this.player.hp -= dmg;

        // Damage flash
        this.player.setTint(0xEF5350);
        this.deathEmitter.setParticleTint(0xEF5350);
        this.deathEmitter.emitParticleAt(this.player.x, this.player.y, 6);
        this.cameras.main.shake(100, 0.005);

        // I-frames
        this.player.isInvulnerable = true;
        const blinkEvent = this.time.addEvent({
            delay: 50, repeat: 9,
            callback: () => { this.player.alpha = this.player.alpha < 1 ? 1 : 0.3; }
        });
        this.time.delayedCall(500, () => {
            this.player.isInvulnerable = false;
            this.player.alpha = 1;
            this.player.clearTint();
            blinkEvent.remove();
        });

        if (this.player.hp <= 0) {
            if (this.player.hasRevive && !this.player.reviveUsed) {
                this.player.reviveUsed = true;
                this.player.hp = Math.floor(this.player.stats.maxHp * 0.5);
                this.player.isInvulnerable = true;
                this.flashScreen(0xA5D6A7, 300);
                this.time.delayedCall(3000, () => { this.player.isInvulnerable = false; this.player.alpha = 1; });
            } else {
                this.playerDeath();
            }
        }
    }

    onEnemyProjHitPlayer(proj, player) {
        if (!proj.active || this.player.isInvulnerable) return;
        const dmg = Math.max(1, (proj.dmg || 10) - this.player.stats.armor);
        this.player.hp -= dmg;
        proj.setActive(false).setVisible(false);
        proj.body.enable = false;
        proj.body.stop();

        this.player.setTint(0xEF5350);
        this.cameras.main.shake(100, 0.005);
        this.player.isInvulnerable = true;
        const blinkEvent = this.time.addEvent({
            delay: 50, repeat: 9,
            callback: () => { this.player.alpha = this.player.alpha < 1 ? 1 : 0.3; }
        });
        this.time.delayedCall(500, () => {
            this.player.isInvulnerable = false;
            this.player.alpha = 1;
            this.player.clearTint();
            blinkEvent.remove();
        });

        if (this.player.hp <= 0) {
            if (this.player.hasRevive && !this.player.reviveUsed) {
                this.player.reviveUsed = true;
                this.player.hp = Math.floor(this.player.stats.maxHp * 0.5);
                this.flashScreen(0xA5D6A7, 300);
                this.player.isInvulnerable = true;
                this.time.delayedCall(3000, () => { this.player.isInvulnerable = false; this.player.alpha = 1; });
            } else {
                this.playerDeath();
            }
        }
    }

    playerDeath() {
        this.isPaused = true;
        this.player.body.setVelocity(0, 0);
        this.cameras.main.shake(300, 0.01);
        this.flashScreen(0xEF5350, 500);
        // Save stats
        const goldEarned = Math.floor(this.runTime * 2) + this.player.goldEarned;
        saveData.gold += goldEarned;
        if (this.runTime > saveData.bestTime) saveData.bestTime = this.runTime;
        saveData.totalKills += this.player.kills;
        // Unlock stage 3 if survived past 20 min
        if (this.runTime >= 1200 && !saveData.unlockedStages.includes('stage_03')) {
            saveData.unlockedStages.push('stage_03');
        }
        // Unlock remaining characters
        if (this.runTime >= 600 && !saveData.unlockedCharacters.includes('char_04')) {
            saveData.unlockedCharacters.push('char_04');
        }
        if (this.runTime >= 900 && !saveData.unlockedCharacters.includes('char_05')) {
            saveData.unlockedCharacters.push('char_05');
        }
        if (this.runTime >= 1200 && !saveData.unlockedCharacters.includes('char_06')) {
            saveData.unlockedCharacters.push('char_06');
        }
        saveSaveData(saveData);

        this.time.delayedCall(1000, () => {
            this.cleanupWeapons();
            this.scene.start('GameOverScene', {
                time: this.runTime, kills: this.player.kills,
                gold: goldEarned, level: this.player.level
            });
        });
    }

    cleanupWeapons() {
        for (const w of this.player.weapons) {
            if (w.destroy) w.destroy();
        }
    }

    spawnXPGem(x, y, value) {
        const gem = this.xpGems.get(x + Phaser.Math.Between(-10, 10), y + Phaser.Math.Between(-10, 10), value >= 10 ? 'xp_gem_rare' : 'xp_gem');
        if (!gem) return;
        gem.setActive(true).setVisible(true);
        gem.body.enable = true;
        gem.setDepth(15);
        gem.xpValue = value;
        gem.body.setVelocity(Phaser.Math.Between(-50, 50), Phaser.Math.Between(-50, 50));
        gem.body.setDrag(100);
    }

    onCollectGem(player, gem) {
        if (!gem.active) return;
        gem.setActive(false).setVisible(false);
        gem.body.enable = false;
        gem.body.stop();

        this.player.xp += gem.xpValue;
        while (this.player.xp >= this.player.xpToNext) {
            this.player.xp -= this.player.xpToNext;
            this.player.level++;
            this.player.xpToNext = this.xpRequired(this.player.level + 1);
            this.triggerLevelUp();
        }
    }

    attractGems() {
        const p = this.player;
        const radius = p.stats.xpRadius;
        this.xpGems.children.each(gem => {
            if (!gem.active) return;
            const dx = p.x - gem.x, dy = p.y - gem.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < radius) {
                const speed = 300 + (radius - dist) * 3;
                gem.body.setVelocity((dx / dist) * speed, (dy / dist) * speed);
            }
        });
    }

    aggregateGems() {
        let count = 0;
        let totalXP = 0;
        let cx = 0, cy = 0;
        this.xpGems.children.each(g => {
            if (g.active) {
                count++;
                totalXP += g.xpValue;
                cx += g.x; cy += g.y;
            }
        });
        if (count > 200) {
            cx /= count; cy /= count;
            this.xpGems.children.each(g => {
                if (g.active) {
                    g.setActive(false).setVisible(false);
                    g.body.enable = false;
                }
            });
            this.spawnXPGem(cx, cy, totalXP);
        }
    }

    xpRequired(level) {
        return Math.floor(10 * Math.pow(level, 1.5) + 50);
    }

    triggerLevelUp() {
        this.levelUpEmitter.emitParticleAt(this.player.x, this.player.y, 30);
        this.cameras.main.shake(100, 0.003);
        this.isPaused = true;
        this.player.body.setVelocity(0, 0);
        this.physics.pause();

        this.time.delayedCall(200, () => {
            this.scene.launch('LevelUpScene', {
                gameScene: this,
                level: this.player.level
            });
        });
    }

    resumeFromLevelUp() {
        this.isPaused = false;
        this.physics.resume();
    }

    addWeapon(weaponId) {
        if (this.player.weapons.length >= 6) return;
        if (this.player.weapons.find(w => w.id === weaponId)) return;
        const wd = WEAPON_DATA[weaponId];
        const WeaponClass = WEAPON_CLASSES[wd.type];
        const weapon = new WeaponClass(this, weaponId, 1);
        this.player.weapons.push(weapon);
        this.updateWeaponDisplay();
    }

    upgradeWeapon(weaponId) {
        const w = this.player.weapons.find(w => w.id === weaponId);
        if (w && w.level < w.data.maxLevel) {
            w.level++;
        }
        this.updateWeaponDisplay();
    }

    addPassive(passiveId) {
        const currentKeys = Object.keys(this.player.passiveLevels).filter(k => this.player.passiveLevels[k] > 0);
        if (currentKeys.length >= 6 && !this.player.passiveLevels[passiveId]) return;
        this.player.passiveLevels[passiveId] = (this.player.passiveLevels[passiveId] || 0) + 1;
        this.recalcPassives();
        this.updatePassiveDisplay();
    }

    recalcPassives() {
        // Reset
        const base = CHARACTER_DATA[this.characterId].stats;
        this.player.stats.maxHp = base.maxHp;
        this.player.stats.cooldownReduction = 0;
        this.player.stats.projectileSpeed = 0;
        this.player.stats.area = base.area;
        this.player.stats.hpRegen = 0;
        this.player.stats.xpRadius = base.xpRadius;
        this.player.stats.effectDuration = 0;
        this.player.stats.luck = base.luck;
        this.player.stats.armor = base.armor;
        this.player.stats.damage = base.damage;

        // Apply meta upgrades
        for (const [key, md] of Object.entries(META_UPGRADE_DATA)) {
            const lvl = saveData.metaLevels[key] || 0;
            if (lvl > 0 && md.stat !== 'revive' && this.player.stats[md.stat] !== undefined) {
                this.player.stats[md.stat] += md.bonusPerLevel * lvl;
            }
        }

        // Apply passives
        for (const [pid, lvl] of Object.entries(this.player.passiveLevels)) {
            const pd = PASSIVE_DATA[pid];
            if (!pd || lvl <= 0) continue;
            const bonus = pd.bonusPerLevel * lvl;
            switch (pd.stat) {
                case 'maxHp': this.player.stats.maxHp = Math.floor(this.player.stats.maxHp * (1 + bonus)); break;
                case 'cooldownReduction': this.player.stats.cooldownReduction += bonus; break;
                case 'projectileSpeed': this.player.stats.projectileSpeed += bonus; break;
                case 'area': this.player.stats.area += bonus; break;
                case 'hpRegen': this.player.stats.hpRegen += bonus; break;
                case 'xpRadius': this.player.stats.xpRadius = Math.floor(base.xpRadius * (1 + bonus)); break;
                case 'effectDuration': this.player.stats.effectDuration += bonus; break;
                case 'luck': this.player.stats.luck += bonus * 100; break;
                case 'armor': this.player.stats.armor += bonus; break;
                case 'damageBonus': this.player.stats.damage += bonus; break;
            }
        }
        this.player.hp = Math.min(this.player.hp, this.player.stats.maxHp);
    }

    updateWeaponDisplay() {
        // Clean old icons
        for (const ic of this.weaponIcons) ic.destroy();
        this.weaponIcons = [];
        for (let i = 0; i < this.player.weapons.length && i < 6; i++) {
            const w = this.player.weapons[i];
            const x = 30 + i * 30, y = 690;
            const color = Phaser.Display.Color.HexStringToColor(w.data.color).color;
            const icon = this.add.circle(x, y, 8, color);
            icon.setScrollFactor(0).setDepth(1002);
            this.weaponIcons.push(icon);
            const lvlTxt = this.add.text(x + 8, y + 8, String(w.level), {
                fontSize: '8px', fontFamily: 'monospace', color: '#fff'
            }).setOrigin(1, 1).setScrollFactor(0).setDepth(1003);
            this.weaponIcons.push(lvlTxt);
        }
        this.updatePassiveDisplay();
    }

    updatePassiveDisplay() {
        if (!this._passiveIcons) this._passiveIcons = [];
        for (const ic of this._passiveIcons) ic.destroy();
        this._passiveIcons = [];
        const passiveIds = Object.keys(this.player.passiveLevels);
        for (let i = 0; i < passiveIds.length && i < 6; i++) {
            const pid = passiveIds[i];
            const pd = PASSIVE_DATA[pid];
            const lvl = this.player.passiveLevels[pid];
            const x = 1100 + i * 30, y = 690;
            const color = Phaser.Display.Color.HexStringToColor(pd.color).color;
            const icon = this.add.circle(x, y, 8, color);
            icon.setScrollFactor(0).setDepth(1002);
            this._passiveIcons.push(icon);
            const lvlTxt = this.add.text(x + 8, y + 8, String(lvl), {
                fontSize: '8px', fontFamily: 'monospace', color: '#fff'
            }).setOrigin(1, 1).setScrollFactor(0).setDepth(1003);
            this._passiveIcons.push(lvlTxt);
        }
    }

    spawnDamageNumber(x, y, dmg) {
        const txt = this.add.text(x, y, String(dmg), {
            fontSize: '14px', fontFamily: 'monospace', fontStyle: 'bold',
            color: dmg >= 50 ? '#FFC107' : '#ECEFF1', stroke: '#000', strokeThickness: 2
        }).setOrigin(0.5).setDepth(100);
        this.damageNumbers.push({ txt, life: 0.5 });
        this.tweens.add({ targets: txt, y: y - 30, alpha: 0, duration: 500, onComplete: () => txt.destroy() });
    }

    updateDamageNumbers(dt) {
        for (let i = this.damageNumbers.length - 1; i >= 0; i--) {
            this.damageNumbers[i].life -= dt;
            if (this.damageNumbers[i].life <= 0) {
                this.damageNumbers.splice(i, 1);
            }
        }
    }

    updateHUD() {
        // HP bar
        const hpPct = Math.max(0, this.player.hp / this.player.stats.maxHp);
        this.hpBarFill.setDisplaySize(198 * hpPct, 14);
        if (hpPct > 0.5) this.hpBarFill.setFillStyle(0x66BB6A);
        else if (hpPct > 0.25) this.hpBarFill.setFillStyle(0xFFEE58);
        else this.hpBarFill.setFillStyle(0xEF5350);

        // Level
        this.levelText.setText('LV.' + this.player.level);

        // Timer
        const totalSec = Math.floor(this.runTime);
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        this.timerText.setText(String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0'));

        // Kills
        const newKills = String(this.player.kills);
        if (this.killText._text !== newKills) {
            this.killText.setText(newKills);
            if (this.killText.container) {
                this.killText.container.setScale(1.3);
                this.tweens.add({ targets: this.killText.container, scaleX: 1, scaleY: 1, duration: 150 });
            }
        }

        // XP bar
        const xpPct = this.player.xp / this.player.xpToNext;
        this.xpBarFill.setDisplaySize(1280 * xpPct, 8);
    }

    flashScreen(color, duration) {
        this.flashOverlay.setFillStyle(color);
        this.flashOverlay.setAlpha(0);
        this.tweens.add({
            targets: this.flashOverlay, alpha: 0.6, duration: duration / 3, yoyo: true,
            hold: duration / 3, onComplete: () => this.flashOverlay.setAlpha(0)
        });
    }

    // Boss system
    checkBossSpawns() {
        const min = this.runTime / 60;
        for (const [key, bd] of Object.entries(BOSS_DATA)) {
            if (this.bossesSpawned[key]) continue;
            if (min >= bd.spawnMinute) {
                this.bossesSpawned[key] = true;
                this.spawnBoss(key);
            }
        }
    }

    spawnBoss(bossId) {
        const bd = BOSS_DATA[bossId];
        const p = this.player;

        // Warning
        this.warningText.setText('WARNING');
        this.warningText.setAlpha(1);
        this.tweens.add({
            targets: this.warningText, alpha: 0, duration: 2000,
            ease: 'Stepped', easeParams: [5]
        });
        this.cameras.main.shake(300, 0.01);

        this.time.delayedCall(2000, () => {
            const angle = Math.random() * Math.PI * 2;
            const bx = p.x + Math.cos(angle) * 500;
            const by = p.y + Math.sin(angle) * 500;
            const tex = 'boss_' + bossId;
            const boss = this.enemies.get(bx, by, tex);
            if (!boss) return;
            boss.setActive(true).setVisible(true);
            boss.body.enable = true;
            boss.setDepth(25);
            boss.body.setCircle(bd.size / 2 - 10);

            if (bossId === 'boss_final') {
                boss.hp = this.player.level * 655350;
            } else {
                boss.hp = Math.floor(500 * (1 + (this.runTime / 60) * 0.15) * bd.hpMult);
            }
            boss.maxHp = boss.hp;
            boss.speed = bd.speed;
            boss.contactDmg = bossId === 'boss_final' ? 9999 : 30;
            boss.xpValue = bossId === 'boss_final' ? 0 : 100;
            boss.isBoss = true;
            boss.bossId = bossId;
            boss.behavior = 'direct';
            boss.noKnockback = true;
            boss.freezeTimer = 0;
            boss.enemyClass = 'boss';
            boss.bossActionTimer = 4;

            // Boss HP bar
            boss.bossHpBg = this.add.rectangle(640, 60, 400, 12, 0x1A1A2E).setScrollFactor(0).setDepth(1000);
            boss.bossHpBg.setStrokeStyle(1, 0xffffff);
            boss.bossHpBar = this.add.rectangle(441, 55, 398, 10, Phaser.Display.Color.HexStringToColor(bd.color).color)
                .setScrollFactor(0).setDepth(1001).setOrigin(0, 0);

            // Pulsing glow
            this.tweens.add({
                targets: boss, alpha: 0.7, duration: 500, yoyo: true, repeat: -1
            });

            this.activeBosses.push(boss);
        });
    }

    updateBosses(dt, time) {
        for (const boss of this.activeBosses) {
            if (!boss.active) continue;
            // Update HP bar
            if (boss.bossHpBar) {
                const pct = Math.max(0, boss.hp / boss.maxHp);
                boss.bossHpBar.setDisplaySize(398 * pct, 10);
            }
            // Boss AI
            boss.bossActionTimer -= dt;
            if (boss.bossId === 'boss_01' && boss.bossActionTimer <= 0) {
                boss.bossActionTimer = 4;
                // Spawn 3 drones
                for (let i = 0; i < 3; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dx = boss.x + Math.cos(angle) * 60;
                    const dy = boss.y + Math.sin(angle) * 60;
                    const drone = this.enemies.get(dx, dy, 'enemy_fodder');
                    if (!drone) continue;
                    drone.setActive(true).setVisible(true);
                    drone.body.enable = true;
                    drone.setDepth(20);
                    drone.setTint(0xCE93D8);
                    drone.hp = 30; drone.maxHp = 30; drone.speed = 200;
                    drone.contactDmg = 10; drone.xpValue = 3;
                    drone.enemyClass = 'fodder_01'; drone.behavior = 'direct';
                    drone.noKnockback = false; drone.isBoss = false;
                    drone.freezeTimer = 0; drone.pauseTimer = 0;
                }
            }
            if (boss.bossId === 'boss_02' && boss.bossActionTimer <= 0) {
                boss.bossActionTimer = 3;
                // AoE bombardment
                const p = this.player;
                const proj = this.enemyProjectiles.get(boss.x, boss.y, 'proj_enemy');
                if (proj) {
                    proj.setActive(true).setVisible(true).setScale(2);
                    proj.body.enable = true;
                    const dx = p.x - boss.x, dy = p.y - boss.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    proj.body.setVelocity((dx / dist) * 150, (dy / dist) * 150);
                    proj.dmg = 20;
                    proj.life = 4;
                    proj.isAoE = true;
                    proj.targetX = p.x; proj.targetY = p.y;
                }
            }
        }
    }

    // Destructibles
    updateDestructibleSpawning(dt) {
        this.destructibleTimer -= dt;
        if (this.destructibleTimer > 0) return;
        this.destructibleTimer = 3;

        let activeCount = 0;
        this.destructibles.children.each(d => { if (d.active) activeCount++; });
        if (activeCount >= 20) return;

        const p = this.player;
        for (let i = 0; i < 3; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 400 + Math.random() * 400;
            const dx = p.x + Math.cos(angle) * dist;
            const dy = p.y + Math.sin(angle) * dist;
            const isLarge = Math.random() < 0.3;
            const tex = isLarge ? 'destructible_large' : 'destructible_small';
            const d = this.destructibles.get(dx, dy, tex);
            if (!d) continue;
            d.setActive(true).setVisible(true);
            d.body.enable = true;
            d.setDepth(8);
            d.body.setImmovable(true);
            d.hp = isLarge ? 10 : 5;
            d.isLarge = isLarge;
        }
    }

    onProjectileHitDestructible(proj, dest) {
        if (!proj.active || !dest.active) return;
        dest.hp -= proj.dmg || 10;
        dest.setTint(0xffffff);
        this.time.delayedCall(50, () => { if (dest.active) dest.clearTint(); });
        if (dest.hp <= 0) {
            this.destroyDestructible(dest);
        }
        if (proj.pierce !== undefined && proj.pierce !== 999) {
            proj.pierce--;
            if (proj.pierce <= 0) {
                proj.setActive(false).setVisible(false);
                proj.body.stop();
            }
        }
    }

    destroyDestructible(dest) {
        dest.setActive(false).setVisible(false);
        dest.body.enable = false;
        this.deathEmitter.setParticleTint(0x455A64);
        this.deathEmitter.emitParticleAt(dest.x, dest.y, 5);

        // Drop table
        const roll = Math.random();
        const isLarge = dest.isLarge;
        if (isLarge) {
            if (roll < 0.40) { /* nothing */ }
            else if (roll < 0.65) this.spawnPickup(dest.x, dest.y, 'heal', 30);
            else if (roll < 0.85) this.spawnPickup(dest.x, dest.y, 'gold', Phaser.Math.Between(2, 5));
            else if (roll < 0.95) this.spawnPickup(dest.x, dest.y, 'magnet', 0);
            else this.spawnPickup(dest.x, dest.y, 'nuke', 0);
        } else {
            if (roll < 0.50) { /* nothing */ }
            else if (roll < 0.80) this.spawnPickup(dest.x, dest.y, 'heal', 15);
            else if (roll < 0.95) this.spawnPickup(dest.x, dest.y, 'gold', Phaser.Math.Between(1, 3));
            else this.spawnPickup(dest.x, dest.y, 'nuke', 0);
        }
    }

    spawnPickup(x, y, type, value) {
        const texMap = { heal: 'pickup_heal', gold: 'pickup_gold', magnet: 'pickup_magnet', nuke: 'pickup_nuke' };
        const pickup = this.pickups.get(x, y, texMap[type]);
        if (!pickup) return;
        pickup.setActive(true).setVisible(true);
        pickup.body.enable = true;
        pickup.setDepth(15);
        pickup.pickupType = type;
        pickup.pickupValue = value;
        // Bob animation
        this.tweens.add({ targets: pickup, y: y - 5, duration: 500, yoyo: true, repeat: -1 });
    }

    onCollectPickup(player, pickup) {
        if (!pickup.active) return;
        pickup.setActive(false).setVisible(false);
        pickup.body.enable = false;
        switch (pickup.pickupType) {
            case 'heal':
                this.player.hp = Math.min(this.player.stats.maxHp, this.player.hp + pickup.pickupValue);
                this.flashScreen(0xA5D6A7, 200);
                break;
            case 'gold':
                this.player.goldEarned += pickup.pickupValue;
                break;
            case 'magnet':
                this.xpGems.children.each(g => {
                    if (g.active) {
                        this.tweens.add({
                            targets: g, x: this.player.x, y: this.player.y, duration: 2000,
                            onComplete: () => {
                                if (g.active) this.onCollectGem(this.player, g);
                            }
                        });
                    }
                });
                break;
            case 'nuke':
                this.flashScreen(0xffffff, 200);
                this.cameras.main.shake(200, 0.015);
                this.enemies.children.each(e => {
                    if (e.active && !e.isBoss) {
                        this.killEnemy(e);
                    }
                });
                break;
        }
    }

    spawnChest(x, y) {
        const chest = this.chests.get(x, y, 'chest');
        if (!chest) return;
        chest.setActive(true).setVisible(true);
        chest.body.enable = true;
        chest.setDepth(15);
        this.tweens.add({
            targets: chest, scaleX: 1.1, scaleY: 1.1, duration: 600, yoyo: true, repeat: -1
        });
    }

    onCollectChest(player, chest) {
        if (!chest.active) return;
        chest.setActive(false).setVisible(false);
        chest.body.enable = false;

        // Check evolutions
        const eligible = [];
        for (const [evoId, evoData] of Object.entries(EVOLUTION_DATA)) {
            const weapon = this.player.weapons.find(w => w.id === evoData.weapon && w.level >= 8);
            if (!weapon) continue;
            const passiveReq = Array.isArray(evoData.passive) ? evoData.passive : [evoData.passive];
            const hasAll = passiveReq.every(pid => (this.player.passiveLevels[pid] || 0) > 0);
            if (hasAll) eligible.push({ evoId, evoData, weapon });
        }

        if (eligible.length === 1) {
            this.applyEvolution(eligible[0]);
        } else if (eligible.length > 1) {
            // Show evolution selection
            this.isPaused = true;
            this.physics.pause();
            this.scene.launch('LevelUpScene', {
                gameScene: this, isEvolution: true, evolutions: eligible
            });
        } else {
            // Fallback: gold + heal + invuln
            this.player.goldEarned += 300;
            this.player.hp = this.player.stats.maxHp;
            this.player.isInvulnerable = true;
            this.flashScreen(0xA5D6A7, 300);
            this.time.delayedCall(10000, () => {
                this.player.isInvulnerable = false;
                this.player.alpha = 1;
            });
        }
    }

    applyEvolution(evo) {
        const { evoId, evoData, weapon } = evo;
        weapon.evolved = true;
        weapon.evoId = evoId;
        weapon.level = 8;
        // Double stats as evolution boost
        weapon.data = { ...weapon.data, baseDmg: weapon.data.baseDmg * 2 };

        // Evolution fanfare
        this.levelUpEmitter.emitParticleAt(this.player.x, this.player.y, 60);
        this.flashScreen(0xffffff, 300);
        this.cameras.main.shake(200, 0.01);
    }

    spawnHazardVehicle() {
        const p = this.player;
        const fromLeft = Math.random() < 0.5;
        const y = p.y + Phaser.Math.Between(-200, 200);
        const x = fromLeft ? p.x - 800 : p.x + 800;
        const vehicle = this.enemies.get(x, y, 'enemy_hazard');
        if (!vehicle) return;
        vehicle.setActive(true).setVisible(true);
        vehicle.body.enable = true;
        vehicle.setDepth(22);
        vehicle.hp = 999; vehicle.maxHp = 999;
        vehicle.speed = 300; vehicle.contactDmg = 50; vehicle.xpValue = 0;
        vehicle.enemyClass = 'hazard_05'; vehicle.behavior = 'linear';
        vehicle.noKnockback = true; vehicle.isBoss = false;
        vehicle.freezeTimer = 0;
        vehicle.body.setVelocity(fromLeft ? 300 : -300, 0);
        vehicle.setFlipX(!fromLeft);
        // Despawn after crossing
        this.time.delayedCall(6000, () => {
            if (vehicle.active) {
                vehicle.setActive(false).setVisible(false);
                vehicle.body.enable = false;
            }
        });
    }
}

// === LEVEL UP SCENE ===
class LevelUpScene extends Phaser.Scene {
    constructor() { super('LevelUpScene'); }

    init(data) {
        this.gameScene = data.gameScene;
        this.isEvolution = data.isEvolution || false;
        this.evolutions = data.evolutions || [];
        this.playerLevel = data.level || 1;
    }

    create() {
        // Darken background
        const overlay = this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.7);

        let options;
        if (this.isEvolution) {
            options = this.evolutions.map(e => ({
                type: 'evolution', id: e.evoId,
                name: e.evoId.toUpperCase(), desc: e.evoData.effect,
                color: e.evoData.color, evoData: e
            }));
        } else {
            options = this.generateOptions();
        }

        if (options.length === 0) {
            // All items maxed - just resume
            this.add.text(640, 360, 'ALL ITEMS MAXED!', {
                fontSize: '24px', fontFamily: 'monospace', color: '#FFC107'
            }).setOrigin(0.5);
            this.time.delayedCall(1000, () => {
                this.gameScene.resumeFromLevelUp();
                this.scene.stop();
            });
            return;
        }

        const cardCount = options.length;
        const cardW = 200, cardH = 120, gap = 20;
        const totalW = cardCount * cardW + (cardCount - 1) * gap;
        const startX = 640 - totalW / 2 + cardW / 2;

        // Title
        const title = this.add.text(640, 150, this.isEvolution ? 'EVOLUTION!' : 'LEVEL UP!', {
            fontSize: '32px', fontFamily: 'monospace', fontStyle: 'bold',
            color: this.isEvolution ? '#FFC107' : '#4FC3F7'
        }).setOrigin(0.5);

        for (let i = 0; i < options.length; i++) {
            const opt = options[i];
            const x = startX + i * (cardW + gap);
            const y = 360;

            const card = this.add.rectangle(x, 800, cardW, cardH, 0x1A1A2E);
            const borderColor = opt.type === 'weapon' || opt.type === 'weaponUpgrade' ? 0xFFC107 :
                               opt.type === 'evolution' ? 0xFFC107 : 0x4FC3F7;
            card.setStrokeStyle(2, borderColor);

            const colorDot = this.add.circle(x - 70, 800, 8, Phaser.Display.Color.HexStringToColor(opt.color || '#fff').color);
            const nameText = this.add.text(x - 55, 800 - 20, opt.name, {
                fontSize: '12px', fontFamily: 'monospace', fontStyle: 'bold', color: opt.color || '#fff'
            }).setOrigin(0, 0.5);
            const descText = this.add.text(x, 800 + 10, opt.desc, {
                fontSize: '10px', fontFamily: 'monospace', color: '#ECEFF1',
                wordWrap: { width: cardW - 20 }, align: 'center'
            }).setOrigin(0.5, 0);
            const typeLabel = this.add.text(x, 800 - 45, opt.type === 'evolution' ? 'EVOLVE' : (opt.type === 'weaponUpgrade' || opt.type === 'passiveUpgrade' ? 'UPGRADE' : 'NEW'), {
                fontSize: '9px', fontFamily: 'monospace', color: '#888'
            }).setOrigin(0.5);

            // Slide in animation
            const targets = [card, colorDot, nameText, descText, typeLabel];
            this.tweens.add({
                targets, y: '-=440', duration: 400, delay: i * 100,
                ease: 'Back.easeOut',
                onComplete: () => {
                    card.setInteractive({ useHandCursor: true });
                    card.on('pointerover', () => card.setStrokeStyle(3, 0xffffff));
                    card.on('pointerout', () => card.setStrokeStyle(2, borderColor));
                    card.on('pointerdown', () => this.selectOption(opt));
                }
            });
        }

        // Keyboard shortcuts 1-4
        this.input.keyboard.on('keydown-ONE', () => { if (options[0]) this.selectOption(options[0]); });
        this.input.keyboard.on('keydown-TWO', () => { if (options[1]) this.selectOption(options[1]); });
        this.input.keyboard.on('keydown-THREE', () => { if (options[2]) this.selectOption(options[2]); });
        this.input.keyboard.on('keydown-FOUR', () => { if (options[3]) this.selectOption(options[3]); });
    }

    generateOptions() {
        const gs = this.gameScene;
        const p = gs.player;
        const pool = [];

        const luck = p.stats.luck || 0;
        const weaponCount = p.weapons.length;
        const passiveCount = Object.keys(p.passiveLevels).filter(k => p.passiveLevels[k] > 0).length;

        // Weapon upgrades
        for (const w of p.weapons) {
            if (w.level < w.data.maxLevel) {
                pool.push({
                    type: 'weaponUpgrade', id: w.id, weight: 20,
                    name: w.id.replace('_', ' ').toUpperCase() + ' LV' + (w.level + 1),
                    desc: w.data.desc, color: w.data.color
                });
            }
        }

        // New weapons (if under cap)
        if (weaponCount < 6) {
            for (const [wid, wd] of Object.entries(WEAPON_DATA)) {
                if (p.weapons.find(w => w.id === wid)) continue;
                pool.push({
                    type: 'weapon', id: wid, weight: 10 + luck * 2,
                    name: wid.replace('_', ' ').toUpperCase(),
                    desc: wd.desc, color: wd.color
                });
            }
        }

        // Passive upgrades
        for (const [pid, lvl] of Object.entries(p.passiveLevels)) {
            const pd = PASSIVE_DATA[pid];
            if (lvl < pd.maxLevel) {
                pool.push({
                    type: 'passiveUpgrade', id: pid, weight: 20,
                    name: pid.replace('_', ' ').toUpperCase() + ' LV' + (lvl + 1),
                    desc: pd.desc, color: pd.color
                });
            }
        }

        // New passives (if under cap)
        if (passiveCount < 6) {
            for (const [pid, pd] of Object.entries(PASSIVE_DATA)) {
                if (p.passiveLevels[pid]) continue;
                const isRare = pid === 'passive_05' || pid === 'passive_06';
                pool.push({
                    type: 'passive', id: pid, weight: isRare ? 5 + luck * 3 : 10 + luck * 2,
                    name: pid.replace('_', ' ').toUpperCase(),
                    desc: pd.desc, color: pd.color
                });
            }
        }

        // Weighted random selection without replacement
        const count = Math.min(this.playerLevel === 1 ? 3 : 4, pool.length);
        const selected = [];
        for (let i = 0; i < count && pool.length > 0; i++) {
            const totalWeight = pool.reduce((s, o) => s + o.weight, 0);
            let roll = Math.random() * totalWeight;
            let picked = pool[0];
            for (const opt of pool) {
                roll -= opt.weight;
                if (roll <= 0) { picked = opt; break; }
            }
            selected.push(picked);
            pool.splice(pool.indexOf(picked), 1);
        }
        return selected;
    }

    selectOption(opt) {
        if (this._selected) return;
        this._selected = true;
        const gs = this.gameScene;
        if (this.isEvolution) {
            gs.applyEvolution(opt.evoData);
        } else {
            switch (opt.type) {
                case 'weapon': gs.addWeapon(opt.id); break;
                case 'weaponUpgrade': gs.upgradeWeapon(opt.id); break;
                case 'passive': gs.addPassive(opt.id); break;
                case 'passiveUpgrade': gs.addPassive(opt.id); break;
            }
        }
        gs.resumeFromLevelUp();
        this.scene.stop();
    }
}

// === GAME OVER SCENE ===
class GameOverScene extends Phaser.Scene {
    constructor() { super('GameOverScene'); }

    init(data) {
        this.runTime = data.time || 0;
        this.kills = data.kills || 0;
        this.goldEarned = data.gold || 0;
        this.playerLevel = data.level || 1;
    }

    create() {
        this.cameras.main.setBackgroundColor(0x0B0E17);

        // Snow
        this.add.particles(0, 0, 'particle', {
            x: { min: 0, max: 1280 }, y: -10,
            speedY: { min: 20, max: 60 }, speedX: { min: -10, max: 10 },
            alpha: { min: 0.2, max: 0.5 }, lifespan: 8000,
            scale: { min: 0.3, max: 0.6 }, quantity: 1, frequency: 100
        });

        this.add.text(640, 120, 'GAME OVER', {
            fontSize: '48px', fontFamily: 'monospace', fontStyle: 'bold', color: '#EF5350'
        }).setOrigin(0.5);

        const min = Math.floor(this.runTime / 60);
        const sec = Math.floor(this.runTime % 60);

        const stats = [
            `TIME SURVIVED: ${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`,
            `ENEMIES KILLED: ${this.kills}`,
            `LEVEL REACHED: ${this.playerLevel}`,
            `GOLD EARNED: ${this.goldEarned}`
        ];

        for (let i = 0; i < stats.length; i++) {
            this.add.text(640, 250 + i * 45, stats[i], {
                fontSize: '20px', fontFamily: 'monospace', color: '#ECEFF1'
            }).setOrigin(0.5);
        }

        // Return button
        const btn = this.add.rectangle(640, 520, 260, 50, 0xFFC107).setStrokeStyle(2, 0xFFD54F);
        this.add.text(640, 520, 'RETURN TO MENU', {
            fontSize: '20px', fontFamily: 'monospace', fontStyle: 'bold', color: '#0B0E17'
        }).setOrigin(0.5);
        btn.setInteractive({ useHandCursor: true });
        btn.on('pointerdown', () => {
            this.scene.start('MenuScene');
        });

        // Quick restart
        const restartBtn = this.add.rectangle(640, 590, 200, 40, 0x1A1A2E).setStrokeStyle(1, 0x555555);
        this.add.text(640, 590, 'QUICK RESTART', {
            fontSize: '16px', fontFamily: 'monospace', color: '#4FC3F7'
        }).setOrigin(0.5);
        restartBtn.setInteractive({ useHandCursor: true });
        restartBtn.on('pointerdown', () => {
            this.scene.start('GameScene', { character: 'char_01', stage: 'stage_01' });
        });
    }
}

// === BOOT ===
const config = {
    type: Phaser.AUTO,
    width: 1280,
    height: 720,
    backgroundColor: '#0B0E17',
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: [BootScene, MenuScene, GameScene, LevelUpScene, GameOverScene],
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    fps: { target: 60, forceSetTimeOut: false }
};

const game = new Phaser.Game(config);
</script>
